name: Rust CI/CD

on:
  push:
    branches: [ "master", "staging" ]
  pull_request:
    branches: [ "master", "staging" ]
  workflow_dispatch: {}

# Serialize release-producing runs per ref so deploy + IPNS publish from
# different commits cannot interleave. Queue rather than cancel: every
# master commit must reach IPNS in commit order.
concurrency:
  group: ww-release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # === Path-based change detection (master push only) ===

  changes:
    name: Detect changes
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/master')
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      std: ${{ steps.filter.outputs.std }}
      host: ${{ steps.filter.outputs.host }}
    steps:
    - uses: actions/checkout@v5
    - uses: dorny/paths-filter@v4
      id: filter
      with:
        filters: |
          std:
            - 'std/**'
            - 'crates/guest/**'
            - 'examples/**'
          host:
            - 'src/**'
            - 'crates/**'
            - 'capnp/**'
            - 'Cargo.toml'
            - 'Cargo.lock'
            - 'build.rs'
            - 'Containerfile*'
            - 'Makefile'
            - '.github/workflows/**'
            - '.github/actions/**'

  # === Always-run checks (PRs and pushes) ===

  fmt:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt

    - name: cargo fmt --all -- --check
      run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy

    - uses: ./.github/actions/setup-capnp

    - uses: Swatinem/rust-cache@v2

    - name: cargo clippy (host crates)
      run: cargo clippy -p ww -p membrane -p atom -p glia -- -D warnings

  solidity:
    name: Solidity (Foundry)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive

    - name: Install Foundry
      uses: foundry-rs/foundry-toolchain@v1
      with:
        # Pin a specific Foundry version so foundryup skips the
        # `api.github.com/repos/foundry-rs/foundry/releases/latest` API
        # call (the `latest`/`stable` channels hit it unconditionally
        # and get 403 rate-limited on shared Actions IPs). The action
        # does not accept a `token` input, so this is the canonical
        # workaround. Bump periodically.
        version: v1.7.1

    - name: Check formatting
      working-directory: contracts/stem
      run: forge fmt --check

    - name: Build contracts
      working-directory: contracts/stem
      run: forge build --sizes

    - name: Run tests
      working-directory: contracts/stem
      run: forge test -vvv

  build:
    name: Build ww binary
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-unknown-linux-gnu, wasm32-wasip2

    - uses: ./.github/actions/setup-capnp

    - uses: Swatinem/rust-cache@v2
      with:
        key: build-test

    - name: Build (compile all crates + test binaries)
      run: cargo build --tests

  test:
    name: Test
    needs: [build]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-unknown-linux-gnu, wasm32-wasip2

    - uses: ./.github/actions/setup-capnp

    - name: Install Foundry
      uses: foundry-rs/foundry-toolchain@v1
      with:
        # See note in the `solidity` job above: pin to avoid 403 rate
        # limits on the unauthenticated `releases/latest` API call.
        version: v1.7.1

    - name: Install IPFS (Kubo)
      run: |
        KUBO_VERSION="v0.33.0"
        wget -qO- "https://dist.ipfs.tech/kubo/${KUBO_VERSION}/kubo_${KUBO_VERSION}_linux-amd64.tar.gz" | tar xz
        sudo mv kubo/ipfs /usr/local/bin/
        rm -rf kubo

    - name: Start IPFS daemon
      run: |
        ipfs init --profile=test
        if [ -n "$IPFS_PEER_ADDR" ]; then
          ipfs bootstrap rm --all
          ipfs bootstrap add "$IPFS_PEER_ADDR"
        fi
        ipfs daemon --enable-gc &
        for i in $(seq 1 30); do ipfs id >/dev/null 2>&1 && break; sleep 0.5; done
      env:
        IPFS_PEER_ADDR: ${{ secrets.IPFS_PEER_ADDR }}

    - uses: Swatinem/rust-cache@v2
      with:
        key: build-test

    - name: Build WASI example binaries
      run: make -C examples/echo

    - name: Run tests (hot cache from build job)
      run: cargo test

  # === Master-only: fan out after checks pass ===

  build-wasm:
    name: Build WASM components
    if: >-
      github.event_name == 'workflow_dispatch'
      || (github.event_name == 'push' && github.ref == 'refs/heads/master')
    needs: [fmt, clippy, solidity, build]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-wasip2

    - uses: ./.github/actions/setup-capnp
      with:
        cache-key-suffix: wasm

    - uses: Swatinem/rust-cache@v2
      with:
        key: wasm-std

    - name: Build WASM std + examples
      run: make std && make examples

    - name: Test WASM components
      run: make test-wasm

    - uses: actions/upload-artifact@v5
      with:
        name: wasm-artifacts
        path: |
          std/kernel/bin/main.wasm
          std/shell/bin/shell.wasm
          std/shell/bin/shell.capnpc
          std/status/bin/status.wasm
          examples/*/bin/
        retention-days: 1

  build-binaries:
    name: Build ${{ matrix.artifact }}
    if: >-
      github.event_name == 'workflow_dispatch'
      || (github.event_name == 'push' && github.ref == 'refs/heads/master'
          && (needs.changes.outputs.std == 'true' || needs.changes.outputs.host == 'true'))
    needs: [changes, fmt, clippy, solidity, build, build-wasm]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ww-linux-x86_64
            bin_path: bin/linux/x86_64
            use_cross: false

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ww-linux-aarch64
            bin_path: bin/linux/aarch64
            use_cross: true

          - target: aarch64-apple-darwin
            os: macos-14
            artifact: ww-macos-aarch64
            bin_path: bin/macos/aarch64
            use_cross: false

          - target: x86_64-apple-darwin
            os: macos-14
            artifact: ww-macos-x86_64
            bin_path: bin/macos/x86_64
            use_cross: false

          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: ww-linux-musl-x86_64
            bin_path: bin/linux/musl-x86_64
            use_cross: false
            install_musl: true

    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive

    - uses: actions/download-artifact@v5
      with:
        name: wasm-artifacts

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - uses: ./.github/actions/setup-capnp
      if: ${{ !matrix.use_cross }}
      with:
        cache-key-suffix: ${{ matrix.target }}

    - name: Install musl toolchain
      if: ${{ matrix.install_musl }}
      run: sudo apt-get update && sudo apt-get install -y musl-tools

    - name: Install cross
      if: ${{ matrix.use_cross }}
      run: cargo install cross --git https://github.com/cross-rs/cross

    - uses: Swatinem/rust-cache@v2
      with:
        key: master-${{ matrix.target }}

    - name: Build (native)
      if: ${{ !matrix.use_cross }}
      run: cargo build --release --target ${{ matrix.target }}

    - name: Build (cross)
      if: ${{ matrix.use_cross }}
      run: cross build --release --target ${{ matrix.target }}

    - name: Package binary
      run: |
        mkdir -p ${{ matrix.bin_path }}
        cp target/${{ matrix.target }}/release/ww ${{ matrix.bin_path }}/ww

    - name: Verify static linking
      if: ${{ matrix.install_musl }}
      run: file ${{ matrix.bin_path }}/ww | grep -qE "static(ally|-pie) linked"

    - uses: actions/upload-artifact@v5
      with:
        name: ${{ matrix.artifact }}
        path: ${{ matrix.bin_path }}/ww
        retention-days: 1

  deploy:
    name: Deploy to master.wetware.run
    if: >-
      github.event_name == 'workflow_dispatch'
      || (github.event_name == 'push' && github.ref == 'refs/heads/master'
          && (needs.changes.outputs.std == 'true' || needs.changes.outputs.host == 'true'))
    needs: [changes, fmt, clippy, solidity, build, build-binaries]
    runs-on: ubuntu-latest
    environment: master
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v5

    - uses: actions/download-artifact@v5
      with:
        name: ww-linux-musl-x86_64
        path: deploy-context

    - uses: actions/download-artifact@v5
      with:
        name: wasm-artifacts
        path: deploy-context/wasm

    - name: Assemble deploy context
      run: |
        cd deploy-context
        chmod +x ww

        # Two-layer layout matching the production k8s manifest:
        #   /usr/share/wetware/kernel/  → kernel image (mounted as base)
        #   /usr/share/wetware/shell/   → shell image (overlaid on kernel)
        # The daemon mounts both as separate root layers; the shell layer
        # provides bin/shell.wasm + bin/shell.capnpc (loaded by the
        # AdminUdsService at startup — shell is a daemon built-in, not
        # an init.d-registered vat).
        mkdir -p wetware/kernel/bin
        mkdir -p wetware/shell/bin

        # Kernel layer: bin/main.wasm is required at the merged root.
        cp wasm/std/kernel/bin/main.wasm wetware/kernel/bin/main.wasm

        # Shell layer: WASM + schema.
        cp wasm/std/shell/bin/shell.wasm    wetware/shell/bin/shell.wasm
        cp wasm/std/shell/bin/shell.capnpc  wetware/shell/bin/shell.capnpc

        cp ../Containerfile.deploy Containerfile

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: deploy-context
        file: deploy-context/Containerfile
        push: true
        tags: |
          ghcr.io/wetware/ww:master
          ghcr.io/wetware/ww:master-${{ github.sha }}

    - name: Wait for image to be pullable from GHCR
      env:
        IMAGE: ghcr.io/wetware/ww:master-${{ github.sha }}
      run: |
        # docker/build-push-action returns when the manifest is pushed, but
        # GHCR's read replicas can lag behind. Confirm the SHA tag is
        # inspectable before we ask k8s to pull it.
        echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
        for i in 1 2 3 4 5; do
          if docker manifest inspect "$IMAGE" >/dev/null 2>&1; then
            echo "Image $IMAGE is pullable"
            exit 0
          fi
          echo "Image not yet visible (attempt $i), retrying..."
          sleep $((i * 5))
        done
        echo "ERROR: image $IMAGE never appeared in GHCR"
        exit 1

    - name: Deploy to VPS
      env:
        SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        SSH_HOST_KEY: ${{ secrets.DEPLOY_SSH_HOST_KEY }}
        VPS_HOST: 77.90.2.37
        VPS_USER: lthibault
        IMAGE: ghcr.io/wetware/ww:master-${{ github.sha }}
      run: |
        mkdir -p ~/.ssh
        echo "$SSH_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        echo "$SSH_HOST_KEY" > ~/.ssh/known_hosts

        # `kubectl set image` rolls out the SHA-tagged image and is
        # idempotent — replaces the previous `rollout restart` against the
        # mutable :master tag, which could pull a node-cached stale image.
        for attempt in 1 2; do
          echo "Deploy attempt $attempt..."
          if ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" \
            "kubectl set image deployment/ww-master '*=$IMAGE' && \
             kubectl rollout status deployment/ww-master --timeout=120s"; then
            echo "Deploy succeeded on attempt $attempt"
            exit 0
          fi
          if [ "$attempt" -lt 2 ]; then
            echo "Deploy failed, retrying in 30s..."
            sleep 30
          fi
        done
        echo "Deploy failed after 2 attempts"
        exit 1

  publish:
    name: Publish to IPFS
    needs: [changes, test, build-binaries, build-wasm, deploy]
    # Run even if build-binaries was skipped (std-only change).
    # `deploy` is in `needs` so installer-facing IPNS only flips after the
    # VPS is serving the new code; on non-master refs deploy is skipped,
    # which the !failure() && !cancelled() guard below tolerates.
    if: >-
      !failure() && !cancelled()
      && (needs.changes.outputs.std == 'true' || needs.changes.outputs.host == 'true'
          || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive

    - uses: actions/download-artifact@v5
      with:
        name: wasm-artifacts
        path: artifacts/wasm-artifacts

    # Download binary artifacts (only available when host lane ran)
    - uses: actions/download-artifact@v5
      if: needs.changes.outputs.host == 'true' || github.event_name == 'workflow_dispatch'
      with:
        name: ww-linux-x86_64
        path: artifacts/ww-linux-x86_64

    - uses: actions/download-artifact@v5
      if: needs.changes.outputs.host == 'true' || github.event_name == 'workflow_dispatch'
      with:
        name: ww-linux-aarch64
        path: artifacts/ww-linux-aarch64

    - uses: actions/download-artifact@v5
      if: needs.changes.outputs.host == 'true' || github.event_name == 'workflow_dispatch'
      with:
        name: ww-macos-aarch64
        path: artifacts/ww-macos-aarch64

    - uses: actions/download-artifact@v5
      if: needs.changes.outputs.host == 'true' || github.event_name == 'workflow_dispatch'
      with:
        name: ww-macos-x86_64
        path: artifacts/ww-macos-x86_64

    - name: Publish to IPFS via VPS
      env:
        SSH_CMD: ssh -i ~/.ssh/deploy_key -o ServerAliveInterval=30 -o ServerAliveCountMax=10
        HOST_CHANGED: ${{ needs.changes.outputs.host }}
      run: |
        # Set up SSH
        mkdir -p ~/.ssh
        echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        echo "${{ secrets.DEPLOY_SSH_HOST_KEY }}" > ~/.ssh/known_hosts

        # Get IPFS pod name
        POD=$($SSH_CMD ${{ secrets.VPS_SSH }} "kubectl --request-timeout=30s get pod -l app=ipfs-daemon -o jsonpath='{.items[0].metadata.name}'")
        if [ -z "$POD" ]; then
          echo "ERROR: failed to discover IPFS daemon pod"
          exit 1
        fi
        echo "IPFS pod: $POD"

        # Assemble clean release tree (artifacts only, no source code)
        STAGE=/tmp/release-tree
        mkdir -p "$STAGE/bin/ww/linux/x86_64" "$STAGE/bin/ww/linux/aarch64"
        mkdir -p "$STAGE/bin/ww/macos/aarch64" "$STAGE/bin/ww/macos/x86_64"
        mkdir -p "$STAGE/include/schema" "$STAGE/lib/ww" "$STAGE/lib/init.d"
        mkdir -p "$STAGE/share/schema"

        # VERSION
        grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/' > "$STAGE/VERSION"

        # Changelog
        cp CHANGELOG.md "$STAGE/"

        # WASM cells (flat under bin/)
        # The host validator requires bin/main.wasm at the merged image
        # root, so the kernel is named main.wasm. Other cells keep their
        # canonical names (loaded by name via embedded loader / VFS).
        cp artifacts/wasm-artifacts/std/kernel/bin/main.wasm   "$STAGE/bin/main.wasm"
        cp artifacts/wasm-artifacts/std/shell/bin/shell.wasm   "$STAGE/bin/shell.wasm"
        cp artifacts/wasm-artifacts/std/status/bin/status.wasm "$STAGE/bin/status.wasm"

        # Example WASM cells (flat, for reference / convenience).
        for example_dir in artifacts/wasm-artifacts/examples/*/bin; do
          if [ -d "$example_dir" ]; then
            name=$(basename "$(dirname "$example_dir")")
            cp "$example_dir"/*.wasm "$STAGE/bin/${name}.wasm" 2>/dev/null || true
          fi
        done

        # Per-example cell-shaped subtrees: enables `ww run /ipns/<key>/examples/<name>`
        # (or `/ipfs/<cid>/examples/<name>`) to mount the cell as a layer.
        # Each subtree mirrors the kernel/shell `<name>/{etc/init.d,bin}/`
        # convention so init.d glia files end up at the merged tree's
        # /etc/init.d/ where the kernel discovers them
        # (std/kernel/src/lib.rs:1148-1188), and `(load "bin/<name>.wasm")`
        # resolves relative to the merged tree root.
        for example_dir in artifacts/wasm-artifacts/examples/*/bin; do
          if [ -d "$example_dir" ]; then
            name=$(basename "$(dirname "$example_dir")")
            mkdir -p "$STAGE/examples/$name/bin"
            cp "$example_dir"/*.wasm "$STAGE/examples/$name/bin/" 2>/dev/null || true
          fi
        done
        for ex_etc in examples/*/etc; do
          if [ -d "$ex_etc/init.d" ]; then
            name=$(basename "$(dirname "$ex_etc")")
            mkdir -p "$STAGE/examples/$name/etc/init.d"
            cp "$ex_etc/init.d"/*.glia "$STAGE/examples/$name/etc/init.d/" 2>/dev/null || true
          fi
        done

        # Compiled schemas (.capnpc) — co-located with their WASM in bin/
        # so init scripts can `(load "bin/shell.capnpc")` relative to the
        # merged image root.
        cp artifacts/wasm-artifacts/std/shell/bin/shell.capnpc "$STAGE/bin/shell.capnpc"

        # Human-readable .capnp schemas
        cp capnp/shell.capnp "$STAGE/include/schema/" 2>/dev/null || true
        for ex_capnp in examples/*/*.capnp; do
          [ -f "$ex_capnp" ] && cp "$ex_capnp" "$STAGE/include/schema/"
        done

        # Glia stdlib
        cp std/lib/ww/*.glia "$STAGE/lib/ww/" 2>/dev/null || true

        # Reference init.d scripts
        cp std/shell/etc/init.d/*.glia "$STAGE/lib/init.d/" 2>/dev/null || true
        for ex_init in examples/*/etc/init.d/*.glia; do
          [ -f "$ex_init" ] && cp "$ex_init" "$STAGE/lib/init.d/"
        done

        # Host binaries: from CI artifacts if host lane ran, else from previous IPNS
        if [ "$HOST_CHANGED" = "true" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "Using fresh binaries from build matrix"
          cp artifacts/ww-linux-x86_64/ww   "$STAGE/bin/ww/linux/x86_64/ww"
          cp artifacts/ww-linux-aarch64/ww   "$STAGE/bin/ww/linux/aarch64/ww"
          cp artifacts/ww-macos-aarch64/ww   "$STAGE/bin/ww/macos/aarch64/ww"
          cp artifacts/ww-macos-x86_64/ww    "$STAGE/bin/ww/macos/x86_64/ww"
        else
          echo "Host unchanged — fetching previous binaries from IPNS"
          # Fail loudly: a partial republish would silently regress users.
          PREV=$($SSH_CMD ${{ secrets.VPS_SSH }} "kubectl exec $POD -- ipfs name resolve /ipns/\$(kubectl exec $POD -- ipfs key list -l | grep ww-release | awk '{print \$1}')")
          if [ -z "$PREV" ]; then
            echo "ERROR: could not resolve previous IPNS — refusing to publish a partial tree"
            exit 1
          fi
          for platform in linux/x86_64 linux/aarch64 macos/aarch64 macos/x86_64; do
            if ! $SSH_CMD ${{ secrets.VPS_SSH }} "kubectl exec $POD -- ipfs cat $PREV/bin/ww/$platform/ww" > "$STAGE/bin/ww/$platform/ww"; then
              echo "ERROR: failed to fetch $platform binary from previous release $PREV"
              exit 1
            fi
            chmod +x "$STAGE/bin/ww/$platform/ww"
          done
          echo "Fetched previous binaries from $PREV"
        fi

        # Sanity check: every platform binary must exist and be non-empty.
        # Catches silent truncation from `ipfs cat` and missing matrix outputs.
        for platform in linux/x86_64 linux/aarch64 macos/aarch64 macos/x86_64; do
          if [ ! -s "$STAGE/bin/ww/$platform/ww" ]; then
            echo "ERROR: $STAGE/bin/ww/$platform/ww is missing or empty"
            exit 1
          fi
        done

        # Checksums (host binaries only)
        # Section headers must match what install.sh expects (grep "^# sha256").
        cd "$STAGE"
        {
          echo "# sha256"
          find bin/ww/ -type f | sort | xargs sha256sum
          echo ""
          if command -v b3sum >/dev/null 2>&1; then
            echo "# blake3"
            find bin/ww/ -type f | sort | xargs b3sum
          fi
        } > CHECKSUMS.txt
        cd -

        # Rsync release tree to VPS
        rsync -a -e "$SSH_CMD" "$STAGE/" ${{ secrets.VPS_SSH }}:/tmp/ww-release-tree/

        # kubectl cp into pod, ipfs add, pin, publish, then push provide
        # records to the DHT so installers resolving from elsewhere can
        # actually fetch the new content (otherwise IPNS may resolve before
        # provides propagate, and `ipfs cat` from a remote node stalls).
        #
        # `set -e` inside the SSH script propagates kubectl-exec failures,
        # and `set -o pipefail` here propagates the SSH exit status through
        # the `tee` pipe (without it, tee always exits 0 and silent
        # publish failures masquerade as success — see issue uncovered in #421).
        set -o pipefail
        published=false
        for attempt in 1 2 3; do
          echo "Publish attempt $attempt..."
          if $SSH_CMD ${{ secrets.VPS_SSH }} "
            set -e
            K='kubectl --request-timeout=5m'
            \$K cp /tmp/ww-release-tree $POD:/tmp/release-tree
            CID=\$(\$K exec $POD -- ipfs add -rQ --cid-version=1 /tmp/release-tree/)
            echo \"CID=\$CID\"
            \$K exec $POD -- ipfs pin add \$CID
            \$K exec $POD -- ipfs name publish --key=ww-release /ipfs/\$CID
            \$K exec $POD -- timeout 60 ipfs routing provide -r \$CID || \
              echo 'WARNING: provide announce timed out; DHT propagation may lag'
            \$K exec $POD -- rm -rf /tmp/release-tree
            rm -rf /tmp/ww-release-tree
          " | tee /tmp/ipfs-publish-output.txt; then
            published=true
            break
          fi

          if [ "$attempt" -lt 3 ]; then
            backoff=$((attempt * 20))
            echo "Publish attempt $attempt failed; retrying in ${backoff}s..."
            sleep "$backoff"
          fi
        done
        if [ "$published" != "true" ]; then
          echo "ERROR: publish failed after 3 attempts"
          exit 1
        fi

        # Extract CID from output
        CID=$(grep '^CID=' /tmp/ipfs-publish-output.txt | cut -d= -f2)
        if [ -z "$CID" ]; then
          echo "ERROR: publish produced empty CID — IPNS was NOT updated"
          exit 1
        fi
        echo "Release CID: $CID"
        echo "CID=$CID" >> "$GITHUB_ENV"

    - name: Record CID
      run: |
        echo "## IPFS Publish" >> "$GITHUB_STEP_SUMMARY"
        echo "- CID: \`${{ env.CID }}\`" >> "$GITHUB_STEP_SUMMARY"
        echo "- IPNS: \`/ipns/${{ secrets.IPNS_KEY_ID }}\`" >> "$GITHUB_STEP_SUMMARY"
